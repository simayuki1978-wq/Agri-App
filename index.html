    <!--

      });

<script>
    'use strict';

    /* =====================================================
       病害虫データ
       ※ 将来的にはバックエンドAPIから取得する
       ===================================================== */
    const DISEASE_DATA = Object.freeze({
        "トマト":    [{ name: "うどんこ病", icon: "🍄" }, { name: "アブラムシ",   icon: "🐛" }],
        "きゅうり":  [{ name: "べと病",     icon: "🍄" }, { name: "ウリハムシ",   icon: "🐞" }],
        "レタス":    [{ name: "軟腐病",     icon: "🦠" }, { name: "ナメクジ",     icon: "🐌" }],
        "ほうれん草":[{ name: "べと病",     icon: "🍄" }, { name: "ケラ",         icon: "🪲" }],
        "キャベツ":  [{ name: "アオムシ",   icon: "🐛" }, { name: "コナガ",       icon: "🦋" }]
    });

    /* =====================================================
       [修正1] XSSを防ぐ: テキストを安全にエスケープする関数
       ===================================================== */
    function escapeHTML(str) {
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(String(str)));
        return div.innerHTML;
    }

    /* =====================================================
       UIステート管理
       ===================================================== */
    function setLoading(isLoading) {
        const btn     = document.getElementById('analyze-btn');
        const loading = document.getElementById('loading');
        btn.disabled        = isLoading;
        btn.textContent     = isLoading ? '⏳ 分析中...' : '🔍 AI分析を開始';
        loading.classList.toggle('active', isLoading);
    }

    function showError(message) {
        const banner = document.getElementById('error-banner');
        // [修正1] XSS対策: innerText を使用
        banner.innerText = message;
        banner.classList.add('active');
    }

    function clearError() {
        const banner = document.getElementById('error-banner');
        banner.innerText = '';
        banner.classList.remove('active');
    }

    /* =====================================================
       病害虫ギャラリー生成
       [修正1] innerHTML ではなく DOM API で安全に生成
       [修正2] 廃止済み Unsplash API を廃止 → アイコン表示
       ===================================================== */
    function renderDiseaseGallery(crop) {
        const gallery  = document.getElementById('disease-gallery');
        // [修正4] innerHTML = "" より安全な方法でクリア
        gallery.replaceChildren();

        const diseases = DISEASE_DATA[crop] || [];
        diseases.forEach(d => {
            // DOM APIで要素を生成（XSSリスクゼロ）
            const item        = document.createElement('div');
            item.className    = 'disease-item';

            const placeholder = document.createElement('div');
            placeholder.className   = 'disease-placeholder';
            // createTextNode でアイコンを安全に挿入
            placeholder.appendChild(document.createTextNode(d.icon));

            const nameDiv     = document.createElement('div');
            nameDiv.appendChild(document.createTextNode(d.name));

            item.appendChild(placeholder);
            item.appendChild(nameDiv);
            gallery.appendChild(item);
        });
    }

    /* =====================================================
       Claude API 呼び出し
       [セキュリティ設計]
       - 本番: fetch('/api/analyze', ...) でバックエンド経由
       - 開発: 開発パネルのキーを使って直接接続（ローカルのみ）
       ===================================================== */
    async function callClaudeAPI(crop, region) {
        const devKey = document.getElementById('api-key-input').value.trim();

        // --- 本番環境: バックエンド経由（APIキーは不要）---
        // const res = await fetch('/api/analyze', {
        //     method: 'POST',
        //     headers: { 'Content-Type': 'application/json' },
        //     body: JSON.stringify({ crop, region })
        // });
        // if (!res.ok) throw new Error(`サーバーエラー: ${res.status}`);
        // const data = await res.json();
        // return data.content[0].text;

        // --- 開発用: APIキーを直接使用（ローカルのみ）---
        if (!devKey) {
            // APIキーがない場合はダミーレスポンスを返す
            return generateDummyResponse(crop, region);
        }

        const prompt = `あなたは農業の専門家AIです。
```

以下の条件で、農家向けの簡潔なアドバイスを日本語で提供してください。

【作物】${crop}
【地域】${region}

以下の形式で回答してください：
■ 現在の注意点（2〜3点）
■ 今週の推奨作業
■ 病害虫リスク評価（低・中・高）

```
        const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'x-api-key': devKey,
                'anthropic-version': '2023-06-01'
            },
            body: JSON.stringify({
                model: 'claude-sonnet-4-20250514',
                max_tokens: 512,
                messages: [{ role: 'user', content: prompt }]
            })
        });

        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err?.error?.message || `APIエラー: ${res.status}`);
        }

        const data = await res.json();
        return data.content?.[0]?.text || 'レスポンスを取得できませんでした。';
    }

    /* =====================================================
       [修正6] ダミーレスポンス（API未接続時のフォールバック）

    function generateDummyResponse(crop, region) {
        // ※ 本番ではAI APIまたは気象APIから取得すること
        const weathers = ["晴れ 28℃", "雨 20℃", "曇り 23℃"];
        const prices   = ["320円/kg（高騰）", "210円/kg（安定）", "180円/kg（下落）"];
        const weather  = weathers[Math.floor(Math.random() * weathers.length)];
        const price    = prices[Math.floor(Math.random() * prices.length)];

        const advice = weather.includes("雨")

        return `【${crop} / ${region}】（デモ表示）

    /* =====================================================
       メインロジック
       ===================================================== */
    async function runAI() {
        clearError();

        // [修正5] 二重クリック防止
        const btn = document.getElementById('analyze-btn');
        if (btn.disabled) return;

        const crop   = document.getElementById('crop').value;
        const region = document.getElementById('region').value;

        // 入力バリデーション
        if (!crop || !region) {
            showError('作物と地域を選択してください。');
            return;
        }

        setLoading(true);

        try {
            const aiText = await callClaudeAPI(crop, region);

            // [修正1] innerText で安全に表示（XSSリスクなし）
            const resultEl = document.getElementById('result-text');
            resultEl.innerText = aiText;

            // 病害虫ギャラリー描画
            renderDiseaseGallery(crop);

            // 結果表示
            const resultCard = document.getElementById('result-card');
            resultCard.style.display = 'block';
            resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });

        } catch (e) {
            console.error(e);
            showError(`エラーが発生しました: ${e.message}`);
        } finally {
            // [修正5] 成功・失敗どちらでもボタンを戻す
            setLoading(false);
        }
    }
</script>
